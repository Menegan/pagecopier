<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Copier - Clone Website UI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>📋 Page Copier</h1>
            <p class="subtitle">Clone the visual UI of any single webpage</p>
        </header>

        <div class="main-content">
            <div class="input-section">
                <label for="urlInput">Enter the URL of the page you want to clone:</label>
                <div class="input-group">
                    <input type="url" id="urlInput" placeholder="https://example.com" autocomplete="off">
                    <button id="cloneBtn">Clone Page</button>
                </div>
                <p class="help-text">Note: Only the visual appearance will be copied, not functionality</p>
            </div>

            <div id="loadingSection" class="loading-section hidden">
                <div class="spinner"></div>
                <p>Cloning page...</p>
            </div>

            <div id="errorSection" class="error-section hidden">
                <div class="error-icon">⚠️</div>
                <p id="errorMessage"></p>
            </div>

            <div id="successSection" class="success-section hidden">
                <div class="success-icon">✅</div>
                <h3>Page cloned successfully!</h3>
                <p class="cloned-url">From: <span id="clonedUrl"></span></p>

                <div class="action-buttons">
                    <button id="downloadBtn" class="btn-primary">💾 Download HTML</button>
                    <button id="previewBtn" class="btn-secondary">👁️ Preview</button>
                    <button id="copyBtn" class="btn-secondary">📄 Copy HTML</button>
                </div>
            </div>

            <div id="previewSection" class="preview-section hidden">
                <div class="preview-header">
                    <h3>Preview</h3>
                    <button id="closePreviewBtn" class="btn-close">✕</button>
                </div>
                <iframe id="previewFrame"></iframe>
            </div>
        </div>

        <footer>
            <p>⚠️ Please ensure you have the right to clone and use the content of the websites you copy.</p>
        </footer>
    </div>

    <script>
        let clonedHtml = '';
        let originalUrl = '';

        const urlInput = document.getElementById('urlInput');
        const cloneBtn = document.getElementById('cloneBtn');
        const loadingSection = document.getElementById('loadingSection');
        const errorSection = document.getElementById('errorSection');
        const errorMessage = document.getElementById('errorMessage');
        const successSection = document.getElementById('successSection');
        const clonedUrl = document.getElementById('clonedUrl');
        const downloadBtn = document.getElementById('downloadBtn');
        const previewBtn = document.getElementById('previewBtn');
        const copyBtn = document.getElementById('copyBtn');
        const previewSection = document.getElementById('previewSection');
        const previewFrame = document.getElementById('previewFrame');
        const closePreviewBtn = document.getElementById('closePreviewBtn');

        // Clone button click
        cloneBtn.addEventListener('click', clonePage);

        // Enter key in input
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                clonePage();
            }
        });

        async function clonePage() {
            const url = urlInput.value.trim();

            if (!url) {
                showError('Please enter a URL');
                return;
            }

            // Basic URL validation
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                showError('URL must start with http:// or https://');
                return;
            }

            // Hide previous results
            hideAllSections();
            loadingSection.classList.remove('hidden');
            cloneBtn.disabled = true;

            try {
                const response = await fetch('/clone', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        url
                    })
                });

                const data = await response.json();

                if (data.success) {
                    clonedHtml = data.html;
                    originalUrl = data.originalUrl;
                    showSuccess();
                } else {
                    showError(data.error || 'Failed to clone page');
                }
            } catch (error) {
                showError('Network error: ' + error.message);
            } finally {
                loadingSection.classList.add('hidden');
                cloneBtn.disabled = false;
            }
        }

        function showSuccess() {
            hideAllSections();
            successSection.classList.remove('hidden');
            clonedUrl.textContent = originalUrl;
        }

        function showError(message) {
            hideAllSections();
            errorSection.classList.remove('hidden');
            errorMessage.textContent = message;
        }

        function hideAllSections() {
            errorSection.classList.add('hidden');
            successSection.classList.add('hidden');
            previewSection.classList.add('hidden');
        }

        // Download HTML
        downloadBtn.addEventListener('click', () => {
            const blob = new Blob([clonedHtml], {
                type: 'text/html'
            });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'cloned-page.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        // Preview
        previewBtn.addEventListener('click', () => {
            previewSection.classList.remove('hidden');
            const blob = new Blob([clonedHtml], {
                type: 'text/html'
            });
            const url = URL.createObjectURL(blob);
            previewFrame.src = url;

            // Try to adjust iframe height after loading
            previewFrame.onload = () => {
                try {
                    const iframeDoc = previewFrame.contentDocument || previewFrame.contentWindow.document;
                    if (iframeDoc && iframeDoc.body) {
                        previewFrame.style.height = (iframeDoc.documentElement.scrollHeight + 50) + 'px';
                    }
                } catch (e) {
                    console.log('Could not resize iframe:', e.message);
                }
            };
        });

        // Close preview
        closePreviewBtn.addEventListener('click', () => {
            previewSection.classList.add('hidden');
            previewFrame.src = '';
        });

        // Copy HTML
        copyBtn.addEventListener('click', async() => {
            try {
                await navigator.clipboard.writeText(clonedHtml);
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '✓ Copied!';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            } catch (error) {
                showError('Failed to copy to clipboard');
            }
        });
    </script>
</body>

</html>
